<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario del Grupo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--green:#22c55e;--bg:#0f172a;--surface:#1e293b;--text:#f1f5f9;--muted:#94a3b8;--border:#2d3f55;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
header{background:linear-gradient(135deg,#15803d,#22c55e);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
header h1{font-size:1.1rem;font-weight:700;color:#fff;}
.add-btn{background:#fff;color:#15803d;border:none;border-radius:8px;padding:7px 14px;font-size:0.78rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;display:inline-block;}
.add-btn:hover{background:#dcfce7;}
.cal-wrap{flex:1;padding:12px;}
.cal-frame{width:100%;border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,0.3);}
iframe{width:100%;height:calc(100vh - 120px);border:none;display:block;}
footer{text-align:center;padding:10px;font-size:0.7rem;color:var(--muted);}
</style>
</head>
<body>
<header>
  <h1>📅 Calendario RUMA</h1>
  <a class="add-btn" href="https://calendar.google.com/calendar/u/0?cid=cGF1bGltYWh1emllckBnbWFpbC5jb20" target="_blank">+ Agregar evento</a>
</header>
<div class="cal-wrap">
  <div class="cal-frame">
    <iframe src="https://calendar.google.com/calendar/embed?src=paulimahuzier%40gmail.com&ctz=America%2FArgentina%2FBuenos_Aires&showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=0&showCalendars=0&showTz=0&mode=MONTH&color=%2322c55e" frameborder="0" scrolling="no" allowfullscreen></iframe>
  </div>
</div>
<footer>Toca "+ Agregar evento" para añadir al calendario</footer>
</body>
</html
